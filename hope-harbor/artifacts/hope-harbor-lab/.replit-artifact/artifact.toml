kind = "web"
previewPath = "/"
title = "Hope Harbor Concept Lab"
version = "1.0.0"
id = "artifacts/hope-harbor-lab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25477

[services.development]
run = "pnpm --filter @workspace/hope-harbor-lab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hope-harbor-lab", "run", "build" ]
publicDir = "artifacts/hope-harbor-lab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25477"
BASE_PATH = "/"
